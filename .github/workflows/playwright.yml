name: Playwright Tests

on:
  push:
    branches: [ main, master, 'feat/**' ]
  pull_request:
    branches: [ main, master ]
  schedule:
    # Run daily at 8 AM UTC (smoke tests)
    - cron: '0 8 * * *'

env:
  CI: true
  NODE_ENV: test

jobs:
  test:
    name: 'Playwright Tests'
    runs-on: ubuntu-latest
    
    strategy:
      fail-fast: false
      matrix:
        shard: [1/4, 2/4, 3/4, 4/4]

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: NewStrongPassword
          MYSQL_DATABASE: real_blog
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'yarn'

    - name: Install dependencies
      run: yarn install --frozen-lockfile

    - name: Install Playwright browsers
      run: yarn playwright install --with-deps

    - name: Setup database
      run: |
        yarn generate:prisma
        yarn db:migrate
      env:
        DATABASE_URL: mysql://root:NewStrongPassword@localhost/real_blog?useUnicode=true&characterEncoding=utf8&useSSL=false
        PRIVATE_JWK: ${{ secrets.PRIVATE_JWK }}

    - name: Run Playwright tests
      run: yarn playwright test --shard=${{ matrix.shard }} --reporter=list,html,junit
      env:
        DATABASE_URL: mysql://root:NewStrongPassword@localhost/real_blog?useUnicode=true&characterEncoding=utf8&useSSL=false
        PRIVATE_JWK: ${{ secrets.PRIVATE_JWK }}

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report-${{ matrix.shardIndex }}
        path: |
          playwright-report/
          test-results/
        retention-days: 30

    - name: Upload JUnit results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: junit-results-${{ matrix.shardIndex }}
        path: playwright-report/junit.xml
        retention-days: 30

  lint:
    name: 'Lint & Format Check'
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'yarn'

    - name: Install dependencies
      run: yarn install --frozen-lockfile

    - name: Run ESLint
      run: yarn lint
      continue-on-error: true

    - name: Check Prettier formatting
      run: yarn prettier --check "tests/**/*.ts" "pages/**/*.ts" "fixtures/**/*.ts"
      continue-on-error: true
